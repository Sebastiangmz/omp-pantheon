# Optional blocking gate. Copy this into a repository that vendors `skills/evalfly/`,
# has `evals/config.json`, and intentionally wants EvalFly to block pull requests.
# Installing omp-pantheon never enables this workflow automatically.
# Configure branch protection to require the `EvalFly required gate` check only after
# the workflow has passed on the target repository.
# Pin third-party actions to reviewed commit SHAs before using this in hardened CI.
name: EvalFly required gate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evalfly-required-gate:
    name: EvalFly required gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run blocking EvalFly check
        env:
          COMMIT_RANGE: ${{ github.event.repository.default_branch }}..${{ github.sha }}
        run: |
          bun run skills/evalfly/bin/evalfly.ts check --suite smoke --commit-range "$COMMIT_RANGE"
      # Do not upload raw traces or secrets. EvalFly privacy metadata is not a privacy proof.
      - name: Upload EvalFly evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evalfly-evidence
          path: |
            evals/runs/*.json
            evals/reports/*.md
          if-no-files-found: error
