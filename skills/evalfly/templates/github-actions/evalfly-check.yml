# Example only. Copy this into a repository that vendors `skills/evalfly/` and has
# `evals/config.json`. It is manual and continue-on-error by default, so installing
# omp-pantheon never adds a CI gate.
name: EvalFly check example

on:
  workflow_dispatch:

jobs:
  evalfly-check:
    name: EvalFly smoke check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Run explicit EvalFly check
        run: |
          bun run skills/evalfly/bin/evalfly.ts check --suite smoke --commit-range "${{ github.event.repository.default_branch }}..${{ github.sha }}"
      - name: Upload EvalFly evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evalfly-evidence
          path: |
            evals/runs/*.json
            evals/reports/*.md
          if-no-files-found: ignore
